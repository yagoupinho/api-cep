<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de CEP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Consultar CEP</h2>
        
        <!-- Input com o ID correspondente ao JS -->
        <label for="cep">Digite o CEP:</label>
        <input type="text" id="cep" placeholder="Ex: 01001000" maxlength="8">
        
        <!-- Botão com o ID correspondente ao JS -->
        <button id="Busca-cep">Buscar CEP</button>

        <!-- Div onde o resultado será renderizado -->
        <div class="resultado">
            <p>Os dados do endereço aparecerão aqui.</p>
        </div>
    </div>

    <!-- IMPORTANTE: Substitua "seu-arquivo.js" pelo nome real do seu arquivo JavaScript -->
    <script src="script.js"></script>
</body>
</html>
